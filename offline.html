<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - VisionScan Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        h1 { font-size: 1.5rem; margin-bottom: 12px; }
        p { color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You are Offline</h1>
    <p>VisionScan Pro works best with an internet connection for AI models.<br>Some features like object detection may be limited offline.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
</body>
</html>
